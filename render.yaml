services:
  - type: web
    name: jarvis-ai-assistant
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: SEARCH_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Optional — only needed if you use Supabase auth (login/sign-up)
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
